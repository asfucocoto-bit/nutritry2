<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NutriDiet Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🍎 NutriDiet Recommendation System</h1>

        <form action="/predict" method="POST" class="form-box">
            <input type="text" name="name" placeholder="Enter your name" required>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>

            <input type="number" name="age" placeholder="Age" required>
            <input type="number" name="height" placeholder="Height (cm)" required>
            <input type="number" name="weight" placeholder="Weight (kg)" required>

            <select name="goal" required>
                <option value="">Select Your Goal</option>
                <option value="weight_loss">Weight Loss</option>
                <option value="muscle_gain">Muscle Gain</option>
                <option value="maintain">Maintain Weight</option>
            </select>

            <select name="food_type" required>
                <option value="">Food Preference</option>
                <option value="veg">Vegetarian</option>
                <option value="nonveg">Non-Vegetarian</option>
            </select>

            <input type="text" name="allergies" placeholder="Allergies (comma separated)">
            <button type="submit">Get My Diet Plan</button>
        </form>

        {% if name %}
        <div class="result">
            <h2>Hi {{ name }}! Your Personalized Diet Plan 🥗</h2>
            <p><strong>Calories:</strong> {{ calories }} kcal</p>
            <p><strong>Protein:</strong> {{ protein }} g | <strong>Fat:</strong> {{ fat }} g | <strong>Carbs:</strong> {{ carbs }} g</p>
            <p><strong>Breakfast:</strong> {{ breakfast }}</p>
            <p><strong>Lunch:</strong> {{ lunch }}</p>
            <p><strong>Dinner:</strong> {{ dinner }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
